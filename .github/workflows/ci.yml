name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/web lint

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/web build

  test-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/mobile test

  typecheck-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/api typecheck

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/api build

  lint-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --dir apps/mobile lint
